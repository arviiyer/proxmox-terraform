<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Console — {{.Name}}</title>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                background: #111;
                color: #eee;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            .toolbar {
                background: #1a1a2e;
                padding: 8px 16px;
                display: flex;
                align-items: center;
                gap: 12px;
                border-bottom: 1px solid #333;
                flex-shrink: 0;
            }
            .toolbar-title {
                font-size: 13px;
                font-weight: 600;
                color: #e47200;
            }
            .toolbar-name {
                font-size: 13px;
                color: #9ca3af;
                font-family: ui-monospace, monospace;
            }
            #status {
                margin-left: auto;
                font-size: 12px;
                color: #9ca3af;
            }
            #screen {
                flex: 1;
                background: #000;
                overflow: hidden;
            }
            #screen canvas { display: block; }
        </style>
    </head>
    <body>
        <div class="toolbar">
            <span class="toolbar-title">sandbox</span>
            <span>›</span>
            <span class="toolbar-name">{{.Name}}</span>
            <span id="status">Connecting…</span>
        </div>
        <div id="screen"></div>

        <script type="module">
            import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc@1.4.0/core/rfb.js';

            const ticket = {{.Ticket | js}};
            const proto  = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl  = proto + '//' + location.host + '/ws/{{.Name}}';
            const status = document.getElementById('status');

            const rfb = new RFB(document.getElementById('screen'), wsUrl, {
                wsProtocols: ['binary'],
            });

            rfb.scaleViewport = true;
            rfb.resizeSession = false;

            rfb.addEventListener('credentialsrequired', () => {
                rfb.sendCredentials({ password: ticket });
            });
            rfb.addEventListener('connect', () => {
                status.textContent = 'Connected';
                status.style.color = '#4ade80';
            });
            rfb.addEventListener('disconnect', (e) => {
                status.textContent = 'Disconnected' + (e.detail.clean ? '' : ' (error)');
                status.style.color = '#f87171';
            });
        </script>
    </body>
</html>
